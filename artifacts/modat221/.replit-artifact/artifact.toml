kind = "web"
previewPath = "/"
title = "مُعدّات 221"
version = "1.0.0"
id = "artifacts/modat221"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23096

[services.development]
run = "pnpm --filter @workspace/modat221 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/modat221", "run", "build" ]
publicDir = "artifacts/modat221/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23096"
BASE_PATH = "/"
